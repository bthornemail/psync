name: Release Matrix

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-unix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.0.2"
          cabal-version: "3.10.2.0"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Compute artifact suffix
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          arch_raw="$(uname -m)"
          case "$arch_raw" in
            x86_64) arch="amd64" ;;
            aarch64|arm64) arch="arm64" ;;
            *) arch="$arch_raw" ;;
          esac
          echo "suffix=${os}-${arch}" >> "$GITHUB_OUTPUT"

      - name: Build Haskell CLI
        shell: bash
        run: |
          set -euo pipefail
          cabal build --builddir=.cabal-ftf
          FTF_BIN="$(cabal list-bin --builddir=.cabal-ftf ftf)"
          mkdir -p dist
          cp "$FTF_BIN" "dist/ftf-${{ steps.meta.outputs.suffix }}"
          chmod +x "dist/ftf-${{ steps.meta.outputs.suffix }}"

      - name: Build Rust verifier
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --manifest-path rust/ftf-verify/Cargo.toml
          cp rust/ftf-verify/target/release/ftf-verify "dist/ftf-verify-${{ steps.meta.outputs.suffix }}"
          chmod +x "dist/ftf-verify-${{ steps.meta.outputs.suffix }}"

      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          (cd dist && shasum -a 256 "ftf-${{ steps.meta.outputs.suffix }}" "ftf-verify-${{ steps.meta.outputs.suffix }}" > "SHA256SUMS-${{ steps.meta.outputs.suffix }}")

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.meta.outputs.suffix }}
          path: dist/*

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.0.2"
          cabal-version: "3.10.2.0"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Haskell CLI
        shell: pwsh
        run: |
          cabal build --builddir=.cabal-ftf
          $ftfBin = cabal list-bin --builddir=.cabal-ftf ftf
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item $ftfBin "dist/ftf-windows-amd64.exe"

      - name: Build Rust verifier
        shell: pwsh
        run: |
          cargo build --release --manifest-path rust/ftf-verify/Cargo.toml
          Copy-Item rust/ftf-verify/target/release/ftf-verify.exe "dist/ftf-verify-windows-amd64.exe"

      - name: Create checksums
        shell: pwsh
        run: |
          $items = @(
            "dist/ftf-windows-amd64.exe",
            "dist/ftf-verify-windows-amd64.exe"
          )
          $out = @()
          foreach ($item in $items) {
            $h = (Get-FileHash -Algorithm SHA256 $item).Hash.ToLower()
            $n = Split-Path $item -Leaf
            $out += "$h  $n"
          }
          $out | Set-Content "dist/SHA256SUMS-windows-amd64"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-amd64
          path: dist/*

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-unix
      - build-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Resolve release notes file
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          candidate="docs/releases/${GITHUB_REF_NAME}.md"
          if [[ -f "$candidate" ]]; then
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
            echo "notes_path=$candidate" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release (notes file)
        if: steps.notes.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: false
          body_path: ${{ steps.notes.outputs.notes_path }}

      - name: Publish GitHub Release (autogenerated notes)
        if: steps.notes.outputs.has_notes != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
