name: Conformance

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify-wire:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.0.2"
          cabal-version: "3.10.2.0"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run conformance harness
        run: bash verify-wire.sh
