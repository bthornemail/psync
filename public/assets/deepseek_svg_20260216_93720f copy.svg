  <!-- Add JavaScript for interactivity (optional) -->
  <script
     type="text/javascript"
     id="script18"><![CDATA[
            // Make points clickable
            document.addEventListener('DOMContentLoaded', function() {
                const points = document.querySelectorAll('.fano-point');
                points.forEach(point => {
                    point.addEventListener('click', function(e) {
                        const pointNum = this.getAttribute('data-point');
                        const color = this.getAttribute('data-color');
                        const name = this.getAttribute('data-name');
                        const path = this.getAttribute('data-path');
                        
                        // Dispatch custom event for parent page
                        const event = new CustomEvent('fanoPointClick', {
                            detail: {
                                point: pointNum,
                                color: color,
                                name: name,
                                path: path
                            }
                        });
                        window.parent.dispatchEvent(event);
                        
                        // Visual feedback
                        this.setAttribute('r', '25');
                        setTimeout(() => this.setAttribute('r', '20'), 200);
                    });
                });
            });
        ]]></script>
